name: radiative-transport-pinns
channels:
  - conda-forge
  - pytorch
  - defaults
dependencies:
  - python=3.9
  - pip=23.0

  # 核心科学计算库
  - numpy>=1.21.0
  - scipy>=1.7.0

  # 深度学习框架
  - pytorch>=2.0.0
  - torchvision>=0.15.0

  # 可视化库
  - matplotlib>=3.5.0
  - seaborn>=0.11.0

  # 数据处理库
  - pandas>=1.3.0

  # 采样库
  - pydoe>=0.3.8

  # VTK文件输出
  - pyevtk>=1.2.0

  # 其他工具
  - tqdm>=4.62.0

  # LaTeX支持（可选，用于高质量绘图）
  # 如果系统没有安装LaTeX，请注释掉下面两行
  # - texlive-core
  # - ghostscript

  # pip安装的包
  - pip:
    - torch>=2.0.0
    - torchvision>=0.15.0
